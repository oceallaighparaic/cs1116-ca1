{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block main_content %}
    <h1>{{ product.name }}</h1>
    <p>{{ product.price_cents/100 }}</p>
    <p>{{ product.description }}</p>
    <img src="{{ url_for('static', filename='images/products/'~product.image) }}" alt="An image of {{ product.name }}" />

    <button>Purchase</button>
{% endblock %}
