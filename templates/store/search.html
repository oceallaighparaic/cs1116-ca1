{% extends "base.html" %}

{% block header %}
{% endblock %}

{% block main_content %}
<section id="productlist">
    {% for p in products %}
        <article>
            <h1>{{ p.name }}</h1>
            <p>&#8364;{{ p.price_cents/100 }}</p>
            <img src="{{ url_for('static', filename='images/products/'~p.image) }}" alt="An image showing {{ p.name }}." />
        </article>
    {% endfor %}
</section>
{% endblock %}
